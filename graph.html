<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

svg {
  width:100vw;
  height:100vh;
}

.node {
  fill:#8ab4ff;
  cursor:pointer;
}

.link {
  stroke:#555;
  stroke-width:1.5px;
}

text {
  fill:white;
  font-size:12px;
  pointer-events:none;
}
</style>
</head>

<body>

<svg></svg>

<script>

// LOAD ONTOLOGY
async function loadGraph() {
  const ontology = await fetch('data/ontology.json').then(r=>r.json());

  let nodes = [];
  let links = [];

  // Create nodes
  for (let key in ontology) {
    nodes.push({ id: key });

    if (ontology[key].related) {
      ontology[key].related.forEach(rel => {
        links.push({
          source: key,
          target: rel
        });
      });
    }
  }

  renderGraph(nodes, links);
}

// RENDER GRAPH
function renderGraph(nodes, links) {

  const svg = d3.select("svg");

  const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(120))
    .force("charge", d3.forceManyBody().strength(-300))
    .force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));

  const link = svg.append("g")
    .selectAll("line")
    .data(links)
    .enter()
    .append("line")
    .attr("class", "link");

  const node = svg.append("g")
    .selectAll("circle")
    .data(nodes)
    .enter()
    .append("circle")
    .attr("class", "node")
    .attr("r", 8)
    .call(d3.drag()
      .on("start", dragstarted)
      .on("drag", dragged)
      .on("end", dragended)
    )
    .on("click", showInfo);

  const label = svg.append("g")
    .selectAll("text")
    .data(nodes)
    .enter()
    .append("text")
    .text(d => d.id);

  simulation.on("tick", () => {
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);

    node
      .attr("cx", d => d.x)
      .attr("cy", d => d.y);

    label
      .attr("x", d => d.x + 10)
      .attr("y", d => d.y + 3);
  });

  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }

  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }

  function showInfo(event, d) {
    alert("Concept: " + d.id);
  }
}

loadGraph();

</script>

</body>
</html>
