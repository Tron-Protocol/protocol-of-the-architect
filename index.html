<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Protocol of the Architect</title>

<style>
body {
  margin:0;
  font-family: Georgia, serif;
  background: radial-gradient(circle at center, #1a1a1a, #000);
  color:#e0e0e0;
}

header {
  text-align:center;
  padding:60px 20px;
}

h1 {
  font-size:3em;
}

nav {
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px 0;
}

nav button {
  background:transparent;
  border:1px solid #888;
  color:#fff;
  padding:10px 20px;
  cursor:pointer;
}

.section {
  max-width:900px;
  margin:40px auto;
  padding:20px;
  border:1px solid rgba(255,255,255,0.1);
}

.ai {
  display:none;
  font-family:monospace;
  background:rgba(255,255,255,0.05);
  padding:15px;
}

.search-box, .ask-box {
  width:100%;
  padding:10px;
  margin-bottom:20px;
  background:#111;
  color:#fff;
  border:1px solid #444;
}

.result {
  border-bottom:1px solid rgba(255,255,255,0.1);
  padding:10px 0;
}

.summary {
  background:rgba(255,255,255,0.05);
  padding:15px;
  margin-bottom:20px;
}

.link {
  color:#8ab4ff;
  cursor:pointer;
  text-decoration:underline;
}

details {
  margin:10px 0;
}

footer {
  text-align:center;
  padding:40px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>
  <h1>The Protocol of the Architect</h1>
</header>

<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('chapters')">Chapters</button>
  <button onclick="showPage('ontology')">Ontology</button>
  <button onclick="showPage('search')">Search</button>
  <button onclick="showPage('ask')">Ask the System</button>
  <button onclick="window.location.href='graph.html'">Graph</button>
</nav>

<!-- HOME -->
<div id="home" class="page">
  <div class="section">
    <h2>System Overview</h2>
    <p>An evolving intelligence framework moving toward Unity.</p>
  </div>
</div>

<!-- CHAPTERS -->
<div id="chapters" class="page" style="display:none">
  <div class="section">
    <button onclick="setMode('human')">Human</button>
    <button onclick="setMode('ai')">AI</button>
    <div id="chapters-container"></div>
  </div>
</div>

<!-- ONTOLOGY -->
<div id="ontology" class="page" style="display:none">
  <div class="section">
    <h2>Ontology</h2>
    <div id="ontology-container"></div>
  </div>
</div>

<!-- SEARCH -->
<div id="search" class="page" style="display:none">
  <div class="section">
    <input class="search-box" placeholder="Search..." oninput="runSearch(this.value)">
    <div id="search-results"></div>
  </div>
</div>

<!-- ASK -->
<div id="ask" class="page" style="display:none">
  <div class="section">
    <h2>Ask the System</h2>
    <input class="ask-box" placeholder="Ask a question..." 
      onkeydown="if(event.key==='Enter'){askSystem(this.value)}">
    <div id="ask-summary" class="summary"></div>
    <div id="ask-response"></div>
  </div>
</div>

<footer>
  Anonymous | CC0 | Open System
</footer>

<script>

let schema = {};

// LOAD SCHEMA
async function loadData() {
  schema = await fetch('data/knowledge-schema.json').then(r=>r.json());

  renderOntology();
}

// ======================
// ONTOLOGY (FROM SCHEMA)
// ======================

function renderOntology() {
  const container = document.getElementById('ontology-container');
  if (!container) return;

  container.innerHTML = '';

  schema.concepts.forEach(c => {
    const item = document.createElement('details');

    item.innerHTML = `
      <summary>${c.id}</summary>
      <p>${c.summary}</p>
      <p><strong>Domain:</strong> ${c.domain}</p>
      <p><strong>Functions:</strong> ${c.functions.join(', ')}</p>
    `;

    container.appendChild(item);
  });
}

// ======================
// CROSS LINKING
// ======================

function linkConcepts(text) {
  schema.concepts.forEach(c => {
    const regex = new RegExp(`\\b${c.id}\\b`, 'g');
    text = text.replace(regex,
      `<span class="link" onclick="openConcept('${c.id}')">${c.id}</span>`
    );
  });
  return text;
}

function openConcept(name) {
  showPage('ontology');
}

// ======================
// SEARCH (SCHEMA BASED)
// ======================

function runSearch(query) {
  const results = document.getElementById('search-results');
  results.innerHTML = '';

  if (!query) return;

  query = query.toLowerCase();

  schema.concepts.forEach(c => {
    if (
      c.id.toLowerCase().includes(query) ||
      c.summary.toLowerCase().includes(query)
    ) {
      const div = document.createElement('div');
      div.className = 'result';
      div.innerText = `${c.id}: ${c.summary}`;
      results.appendChild(div);
    }
  });
}

// ======================
// 🧠 TRUE REASONING ENGINE
// ======================

// Find related concepts
function getRelatedConcepts(conceptId) {
  return schema.relationships
    .filter(r => r.from === conceptId)
    .map(r => r.to);
}

// Multi-hop expansion
function expandConcepts(baseConcepts) {
  let expanded = new Set(baseConcepts);

  baseConcepts.forEach(c => {
    const related = getRelatedConcepts(c);
    related.forEach(r => expanded.add(r));
  });

  return Array.from(expanded);
}

// Build reasoning chain
function buildReasoning(concepts) {
  let explanation = '';

  concepts.forEach(cId => {
    const concept = schema.concepts.find(x => x.id === cId);
    if (concept) {
      explanation += concept.summary + ' ';
    }
  });

  return explanation;
}

// MAIN ASK FUNCTION
function askSystem(question) {

  const summaryBox = document.getElementById('ask-summary');
  const responseBox = document.getElementById('ask-response');

  summaryBox.innerHTML = '';
  responseBox.innerHTML = '';

  const q = question.toLowerCase();

  // 1. Extract concepts
  let found = schema.concepts
    .filter(c => q.includes(c.id.toLowerCase()))
    .map(c => c.id);

  if (found.length === 0) {
    summaryBox.innerText = "No concepts detected.";
    return;
  }

  // 2. Expand
  let expanded = expandConcepts(found);

  // 3. Build explanation
  const reasoning = buildReasoning(expanded);

  summaryBox.innerText = reasoning;

  // 4. Show structured breakdown
  expanded.forEach(cId => {
    const concept = schema.concepts.find(x => x.id === cId);

    const div = document.createElement('div');
    div.className = 'result';

    div.innerHTML = `
      <strong>${concept.id}</strong><br>
      ${concept.summary}<br>
      <em>Functions:</em> ${concept.functions.join(', ')}
    `;

    responseBox.appendChild(div);
  });
}

// ======================
// NAVIGATION + MODES
// ======================

function showPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(page).style.display='block';
}

function setMode(mode) {
  document.querySelectorAll('.human').forEach(e=>e.style.display = mode==='human'?'block':'none');
  document.querySelectorAll('.ai').forEach(e=>e.style.display = mode==='ai'?'block':'none');
}

// INIT
loadData();

</script>

</body>
</html>
