<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Protocol of the Architect</title>
<style>
body { margin:0; font-family: Georgia, serif; background: radial-gradient(circle at center, #1a1a1a, #000); color:#e0e0e0; }
header { text-align:center; padding:60px 20px; }
h1 { font-size:3em; letter-spacing:2px; }
.subtitle { opacity:0.7; }
nav { display:flex; justify-content:center; gap:20px; margin:20px 0; }
nav button { background:transparent; border:1px solid #888; color:#fff; padding:10px 20px; cursor:pointer; }
.section { max-width:900px; margin:40px auto; padding:20px; border:1px solid rgba(255,255,255,0.1); }
.toggle { text-align:right; }
.ai { display:none; font-family:monospace; background:rgba(255,255,255,0.05); padding:15px; white-space:pre-wrap; }
.search-box { width:100%; padding:10px; margin-bottom:20px; background:#111; color:#fff; border:1px solid #444; }
.result { border-bottom:1px solid rgba(255,255,255,0.1); padding:10px 0; cursor:pointer; }
details { margin:10px 0; }
footer { text-align:center; padding:40px; opacity:0.6; }
</style>
</head>
<body>

<header>
  <h1>The Protocol of the Architect</h1>
  <div class="subtitle">A Techno-Theological Framework</div>
</header>

<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('chapters')">Chapters</button>
  <button onclick="showPage('ontology')">Ontology</button>
  <button onclick="showPage('search')">Search</button>
</nav>

<!-- HOME -->
<div id="home" class="page">
  <div class="section">
    <h2>About</h2>
    <p>This system defines reality as an interface-driven experiential construct where consciousness evolves into Unity.</p>
  </div>
</div>

<!-- CHAPTERS -->
<div id="chapters" class="page" style="display:none">
  <div class="section">
    <div class="toggle">
      <button onclick="setMode('human')">Human</button>
      <button onclick="setMode('ai')">AI</button>
    </div>
    <div id="chapters-container"></div>
  </div>
</div>

<!-- ONTOLOGY -->
<div id="ontology" class="page" style="display:none">
  <div class="section">
    <h2>Ontology</h2>
    <div id="ontology-container"></div>
  </div>
</div>

<!-- SEARCH -->
<div id="search" class="page" style="display:none">
  <div class="section">
    <h2>Search the System</h2>
    <input class="search-box" placeholder="Search concepts or statements..." oninput="runSearch(this.value)">
    <div id="search-results"></div>
  </div>
</div>

<footer>
  Anonymous | CC0 | Open System
</footer>

<script>
let ontology = {};
let chapters = [];
let statements = [];

async function loadData() {
  ontology = await fetch('data/ontology.json').then(r=>r.json());
  chapters = await fetch('data/chapters.json').then(r=>r.json());
  statements = await fetch('data/statements.json').then(r=>r.json());

  renderOntology();
  renderChapters();
}

function renderOntology() {
  const container = document.getElementById('ontology-container');
  container.innerHTML = '';

  for (let key in ontology) {
    const item = document.createElement('details');
    item.innerHTML = `<summary>${key}</summary><p>${ontology[key].description || ''}</p>`;
    container.appendChild(item);
  }
}

function renderChapters() {
  const container = document.getElementById('chapters-container');
  container.innerHTML = '';

  chapters.chapters.forEach(ch => {
    const div = document.createElement('div');
    div.innerHTML = `
      <h3>${ch.title}</h3>
      <div class="human">${ch.human}</div>
      <div class="ai">${JSON.stringify(ch.ai, null, 2)}</div>
    `;
    container.appendChild(div);
  });
}

function runSearch(query) {
  const results = document.getElementById('search-results');
  results.innerHTML = '';

  if (!query) return;

  query = query.toLowerCase();

  statements.statements.forEach(s => {
    if (s.toLowerCase().includes(query)) {
      const div = document.createElement('div');
      div.className = 'result';
      div.innerText = s;
      results.appendChild(div);
    }
  });

  for (let key in ontology) {
    if (key.toLowerCase().includes(query)) {
      const div = document.createElement('div');
      div.className = 'result';
      div.innerText = `Concept: ${key}`;
      results.appendChild(div);
    }
  }
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(page).style.display='block';
}

function setMode(mode) {
  document.querySelectorAll('.human').forEach(e=>e.style.display = mode==='human'?'block':'none');
  document.querySelectorAll('.ai').forEach(e=>e.style.display = mode==='ai'?'block':'none');
}

loadData();
</script>

</body>
</html>
