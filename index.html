<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Protocol of the Architect</title>
<style>
body { margin:0; font-family: Georgia, serif; background: radial-gradient(circle at center, #1a1a1a, #000); color:#e0e0e0; }
header { text-align:center; padding:60px 20px; }
h1 { font-size:3em; }
nav { display:flex; justify-content:center; gap:20px; margin:20px 0; }
nav button { background:transparent; border:1px solid #888; color:#fff; padding:10px 20px; cursor:pointer; }
.section { max-width:900px; margin:40px auto; padding:20px; border:1px solid rgba(255,255,255,0.1); }
.ai { display:none; font-family:monospace; background:rgba(255,255,255,0.05); padding:15px; }
.search-box, .ask-box { width:100%; padding:10px; margin-bottom:20px; background:#111; color:#fff; border:1px solid #444; }
.result { border-bottom:1px solid rgba(255,255,255,0.1); padding:10px 0; }
.link { color:#8ab4ff; cursor:pointer; text-decoration:underline; }
footer { text-align:center; padding:40px; opacity:0.6; }
</style>
</head>
<body>

<header>
  <h1>The Protocol of the Architect</h1>
</header>

<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('chapters')">Chapters</button>
  <button onclick="showPage('ontology')">Ontology</button>
  <button onclick="showPage('search')">Search</button>
  <button onclick="showPage('ask')">Ask the System</button>
</nav>

<div id="home" class="page">
  <div class="section">
    <h2>System Overview</h2>
    <p>An evolving intelligence framework moving toward Unity.</p>
  </div>
</div>

<div id="chapters" class="page" style="display:none">
  <div class="section">
    <button onclick="setMode('human')">Human</button>
    <button onclick="setMode('ai')">AI</button>
    <div id="chapters-container"></div>
  </div>
</div>

<div id="ontology" class="page" style="display:none">
  <div class="section">
    <h2>Ontology</h2>
    <div id="ontology-container"></div>
  </div>
</div>

<div id="search" class="page" style="display:none">
  <div class="section">
    <input class="search-box" placeholder="Search..." oninput="runSearch(this.value)">
    <div id="search-results"></div>
  </div>
</div>

<div id="ask" class="page" style="display:none">
  <div class="section">
    <h2>Ask the System</h2>
    <input class="ask-box" placeholder="Ask a question..." onkeydown="if(event.key==='Enter'){askSystem(this.value)}">
    <div id="ask-response"></div>
  </div>
</div>

<footer>Anonymous | CC0</footer>

<script>
let ontology = {};
let statements = [];

// Load data
async function loadData() {
  ontology = await fetch('data/ontology.json').then(r=>r.json());
  statements = await fetch('data/statements.json').then(r=>r.json());
}

// 🔍 Extract key concepts from question
function extractConcepts(question) {
  const q = question.toLowerCase();
  let found = [];

  for (let key in ontology) {
    if (q.includes(key.toLowerCase())) {
      found.push(key);
    }
  }

  return found;
}

// 🔗 Expand to related concepts (basic graph expansion)
function expandConcepts(concepts) {
  let expanded = new Set(concepts);

  concepts.forEach(c => {
    if (ontology[c] && ontology[c].related) {
      ontology[c].related.forEach(r => expanded.add(r));
    }
  });

  return Array.from(expanded);
}

// 🔢 Score statements by concept relevance
function scoreStatement(statement, concepts) {
  let score = 0;
  const s = statement.toLowerCase();

  concepts.forEach(c => {
    if (s.includes(c.toLowerCase())) {
      score += 3;
    }
  });

  return score;
}

// 🧠 Build reasoning chain
function buildReasoning(statementsList) {
  if (statementsList.length === 0) return "No reasoning available.";

  // Step 1: pick strongest statement
  let core = statementsList[0];

  // Step 2: connect related ideas
  let explanation = core.text;

  statementsList.slice(1,4).forEach(s => {
    explanation += " " + s.text;
  });

  return explanation;
}

// 🤖 MAIN ENGINE
function askSystem(question) {
  const responseBox = document.getElementById('ask-response');
  const summaryBox = document.getElementById('ask-summary');

  responseBox.innerHTML = '';
  summaryBox.innerHTML = '';

  // 1. Extract concepts
  let concepts = extractConcepts(question);

  // 2. Expand concepts
  let expandedConcepts = expandConcepts(concepts);

  // 3. Score statements
  let scored = [];

  statements.statements.forEach(s => {
    let score = scoreStatement(s, expandedConcepts);
    if (score > 0) {
      scored.push({ text: s, score });
    }
  });

  // 4. Boost ontology definitions
  expandedConcepts.forEach(c => {
    if (ontology[c]) {
      scored.push({
        text: ontology[c].description || c,
        score: 10
      });
    }
  });

  // 5. Sort
  scored.sort((a,b) => b.score - a.score);

  const top = scored.slice(0,8);

  if (top.length === 0) {
    summaryBox.innerText = "No meaningful reasoning found.";
    return;
  }

  // 6. Build reasoning answer
  const reasoning = buildReasoning(top);

  summaryBox.innerText = reasoning;

  // 7. Show evidence
  top.forEach(r => {
    const div = document.createElement('div');
    div.className = 'result';
    div.innerText = r.text;
    responseBox.appendChild(div);
  });
}

loadData();
</script>

</body>
</html>
